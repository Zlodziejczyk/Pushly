<svg width="130" height="40" viewBox="0 0 130 40" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* De stuiter-animatie, vergelijkbaar met Tailwind's animate-bounce */
    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }
    
    .dot {
      fill: #3b82f6; /* Tailwind's blue-500 */
      animation: bounce 1s infinite ease-in-out;
    }
    
    /* Precieze delays uit je originele HTML */
    .d1 { animation-delay: 0s; }
    .d2 { animation-delay: 0.2s; }
    .d3 { animation-delay: 0.4s; }
    
    .brand-text {
      fill: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 22px;
    }
  </style>

  <circle cx="12" cy="24" r="4" class="dot d1" />
  <circle cx="24" cy="24" r="4" class="dot d2" />
  <circle cx="36" cy="24" r="4" class="dot d3" />

  <text x="48" y="28" class="brand-text">Pushly</text>
</svg>